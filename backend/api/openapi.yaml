openapi: 3.1.0
info:
  title: Crownfall HTTP API
  version: 0.1.0
  description: Initial authoritative-server control API. Placeholder operations return 501 until implemented.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200": { $ref: "#/components/responses/Status" }
  /readyz:
    get:
      operationId: getReadiness
      responses:
        "200": { $ref: "#/components/responses/Status" }
  /v1/auth/sessions:
    post:
      operationId: createSession
      x-crownfall-implemented: false
      responses: { "501": { description: Not implemented } }
  /v1/lobbies:
    get:
      operationId: listLobbies
      x-crownfall-implemented: false
      responses: { "501": { description: Not implemented } }
  /v1/rooms:
    post:
      operationId: createRoom
      x-crownfall-implemented: false
      responses: { "501": { description: Not implemented } }
  /v1/rooms/{roomId}/participants:
    post:
      operationId: joinRoom
      x-crownfall-implemented: false
      parameters:
        - { name: roomId, in: path, required: true, schema: { type: string } }
      responses: { "501": { description: Not implemented } }
  /v1/matches/{matchId}/history:
    get:
      operationId: getMatchHistory
      x-crownfall-implemented: false
      parameters:
        - { name: matchId, in: path, required: true, schema: { type: string } }
      responses: { "501": { description: Not implemented } }
components:
  schemas:
    Status:
      type: object
      required: [status]
      properties: { status: { type: string } }
  responses:
    Status:
      description: Service status
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Status" }
