asyncapi: 3.1.0
info:
  title: Crownfall Realtime Protocol
  version: 1.0.0
  description: Implemented bootstrap control protocol. Authentication is a test-token boundary pending production identity integration.
servers:
  local:
    host: localhost:8080
    protocol: ws
channels:
  match:
    address: /ws{?matchId,playerId}
    messages:
      clientCommand: { $ref: "#/components/messages/ClientCommand" }
      serverEvent: { $ref: "#/components/messages/ServerEvent" }
operations:
  receiveCommand:
    action: receive
    channel: { $ref: "#/channels/match" }
    messages: [{ $ref: "#/channels/match/messages/clientCommand" }]
  sendEvent:
    action: send
    channel: { $ref: "#/channels/match" }
    messages: [{ $ref: "#/channels/match/messages/serverEvent" }]
components:
  messages:
    ClientCommand:
      payload: { $ref: "#/components/schemas/ClientEnvelope" }
    ServerEvent:
      payload: { $ref: "#/components/schemas/ServerEnvelope" }
  schemas:
    ClientEnvelope:
      type: object
      additionalProperties: false
      required: [version, messageId, command]
      properties:
        version: { const: "1.0.0" }
        messageId: { type: string, minLength: 1 }
        command: { $ref: "#/components/schemas/Command" }
    Command:
      type: object
      additionalProperties: false
      required: [commandId, matchId, playerId, expectedRevision, commandType, payload, clientTimestamp, clientSequence]
      properties:
        commandId: { type: string, minLength: 1 }
        matchId: { type: string, minLength: 1 }
        playerId: { type: string, minLength: 1 }
        expectedRevision: { type: integer, minimum: 0 }
        commandType: { type: string, enum: [JOIN_ROOM, SET_READY, START_MATCH, ACKNOWLEDGE_ROLE] }
        payload: { type: object }
        clientTimestamp: { type: string, format: date-time }
        clientSequence: { type: integer, minimum: 1 }
    ServerEnvelope:
      type: object
      additionalProperties: false
      required: [version, messageId, serverTime, type, payload]
      properties:
        version: { const: "1.0.0" }
        messageId: { type: string }
        matchId: { type: string }
        sequence: { type: integer, minimum: 0 }
        serverTime: { type: string, format: date-time }
        type:
          type: string
          enum: [connection.accepted, connection.resynced, match.publicState, match.privateState, match.privateEvents, protocol.error]
        payload:
          description: Recipient-filtered public state, private player state, role event, acknowledgement, or protocol error.
    PublicMatchView:
      type: object
      description: Implemented public room/match projection; contains no role, faction, objective, or seed.
    PrivatePlayerView:
      type: object
      description: Implemented authenticated-recipient projection including only that player's role and acknowledgement status.
    VoteCommand:
      type: object
      description: Planned and unimplemented vote placeholder.
    Reconnect:
      type: object
      description: Implemented in-memory resync on authenticated WebSocket replacement; durable replay remains deferred.
    Chat:
      type: object
      description: Planned and unimplemented chat placeholder.
    Presence:
      type: object
      description: Connection lifecycle exists; durable presence leases are planned and unimplemented.
