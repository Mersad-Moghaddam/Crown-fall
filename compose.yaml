services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crownfall
      POSTGRES_USER: crownfall
      POSTGRES_PASSWORD: crownfall
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crownfall"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - crownfallPostgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      CROWNFALL_HTTP_ADDRESS: :8080
      CROWNFALL_LOG_LEVEL: info
      CROWNFALL_DATABASE_URL: postgres://crownfall:crownfall@postgres:5432/crownfall?sslmode=disable
      CROWNFALL_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WEBSOCKET_URL: ws://localhost:8080/ws
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  crownfallPostgres:
